<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donor Dashboard - SaveNShare</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
 
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    :root {
      --green: #16a34a;
      --green-light: #dcfce7;
      --green-dark: #15803d;
      --orange: #f97316;
      --bg: #f0fdf4;
      --card: #ffffff;
      --text: #14532d;
      --muted: #6b7280;
      --border: #d1fae5;
    }
 
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: #1c1917;
    }
 
    /* ─── HEADER ─── */
    header {
      background: linear-gradient(135deg, #22c55e, var(--green-dark));
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 16px rgba(22,163,74,0.35);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-brand h1 { font-size: 20px; font-weight: 800; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .stats-pill {
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
    }
    .btn-logout {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.5);
      color: white;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.35); }
 
    /* ─── TABS ─── */
    .tabs {
      display: flex;
      background: white;
      border-bottom: 2px solid #e5e7eb;
      padding: 0 24px;
      position: sticky;
      top: 57px;
      z-index: 99;
    }
    .tab {
      padding: 14px 22px;
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
      user-select: none;
    }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }
    .tab:hover:not(.active) { color: #1c1917; }
 
    /* ─── MAIN ─── */
    .main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
 
    /* ─── POST FORM ─── */
    .form-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      border: 1.5px solid var(--border);
    }
    .form-card h2 { font-size: 18px; font-weight: 800; margin-bottom: 18px; color: #1c1917; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media(max-width:600px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 700; color: #374151; }
    input, select, textarea {
      padding: 9px 12px;
      border-radius: 8px;
      border: 1.5px solid #e5e7eb;
      font-size: 14px;
      font-family: inherit;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
      background: white;
    }
    textarea { resize: vertical; min-height: 72px; }
    .btn-post {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #22c55e, var(--green-dark));
      color: white;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 18px rgba(22,163,74,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-post:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(22,163,74,0.55); }
    .btn-post:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
 
    /* ─── DONATION CARD ─── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .section-header h2 { font-size: 18px; font-weight: 800; }
    .count-badge {
      background: var(--green-light); color: var(--green-dark);
      font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    }
 
    .donation-card {
      background: white;
      border-radius: 16px;
      border: 1.5px solid #e5e7eb;
      padding: 16px;
      margin-bottom: 14px;
      display: flex;
      gap: 16px;
      animation: fadeUp 0.3s ease both;
      transition: box-shadow 0.2s;
    }
    .donation-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
    .donation-card.requested-card { border-color: #93c5fd; background: #eff6ff; }
    .donation-card.accepted-card  { border-color: #fcd34d; background: #fffbeb; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .food-thumb {
      width: 90px;
      min-width: 90px;
      height: 80px;
      border-radius: 10px;
      background: #f0fdf4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      overflow: hidden;
    }
    .food-thumb img { width: 100%; height: 100%; object-fit: cover; }
 
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .chip {
      display: inline-flex; align-items: center; gap: 3px;
      background: #f4f4f5; border-radius: 999px;
      padding: 3px 9px; font-size: 12px; color: #44403c; font-weight: 600;
    }
    .card-details { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
 
    /* ─── ACTION BUTTONS ─── */
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .btn-accept {
      background: linear-gradient(135deg, #22c55e, var(--green-dark));
      color: white; border: none;
      padding: 7px 16px; border-radius: 999px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
      box-shadow: 0 3px 10px rgba(22,163,74,0.4);
      transition: transform 0.15s;
    }
    .btn-accept:hover { transform: translateY(-1px); }
    .btn-accept:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-reject {
      background: white; color: #dc2626;
      border: 1.5px solid #fca5a5;
      padding: 7px 16px; border-radius: 999px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: background 0.15s;
    }
    .btn-reject:hover { background: #fef2f2; }
    .btn-reject:disabled { opacity: 0.6; cursor: not-allowed; }
 
    /* ─── STATUS BADGE ─── */
    .status-badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 999px; font-size: 11px;
      font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .status-posted    { background: #dcfce7; color: #15803d; }
    .status-requested { background: #dbeafe; color: #1d4ed8; }
    .status-accepted  { background: #fef3c7; color: #b45309; }
 
    /* ─── REQUESTER ALERT ─── */
    .requester-alert {
      background: #eff6ff;
      border: 1.5px solid #93c5fd;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 10px;
      color: #1e40af;
      font-weight: 600;
    }
 
    /* ─── EMPTY / LOADING ─── */
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty .empty-icon { font-size: 52px; margin-bottom: 10px; }
    .empty p { font-size: 15px; }
    .loading { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }
 
    /* ─── TOAST ─── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1c1917; color: white;
      padding: 12px 24px; border-radius: 999px;
      font-size: 14px; font-weight: 600;
      z-index: 9999; transition: transform 0.3s ease;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--green); }
    #toast.error { background: #dc2626; }
 
    @media(max-width:600px) {
      .donation-card { flex-direction: column; }
      .food-thumb { width: 100%; height: 150px; min-width: unset; }
    }
  </style>
</head>
<body>
 
<header>
  <div class="header-brand">
    <span style="font-size:22px">🥗</span>
    <h1>SaveNShare &nbsp;·&nbsp; Donor</h1>
  </div>
  <div class="header-right">
    <div class="stats-pill" id="statsDisplay">—</div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</header>
 
<div class="tabs">
  <div class="tab active" onclick="switchTab('post', this)">📤 Post Donation</div>
  <div class="tab" onclick="switchTab('mydonations', this)">📦 My Donations</div>
</div>
 
<div class="main">
 
  <!-- TAB: Post Donation -->
  <div id="tab-post" class="tab-panel active">
    <div class="form-card">
      <h2>Post New Donation 🍱</h2>
      <form id="postForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Food Image (optional)</label>
            <input type="file" id="image" accept="image/*">
          </div>
          <div class="form-group">
            <label>Type of Food *</label>
            <select id="foodType" required>
              <option value="">Select type</option>
              <option value="Cooked">Cooked food</option>
              <option value="Packed">Packed / sealed</option>
              <option value="Dry">Dry items (rice, dal, etc.)</option>
              <option value="Snacks">Snacks / bakery</option>
            </select>
          </div>
          <div class="form-group">
            <label>Quantity *</label>
            <select id="quantity" required>
              <option value="">Select quantity</option>
              <option value="1-3 people">1–3 people</option>
              <option value="4-6 people">4–6 people</option>
              <option value="7-10 people">7–10 people</option>
              <option value="10+ people">More than 10 people</option>
            </select>
          </div>
          <div class="form-group">
            <label>Good for (hours) *</label>
            <select id="bestBeforeHours" required>
              <option value="">Select time</option>
              <option value="2">2 hours</option>
              <option value="4">4 hours</option>
              <option value="6">6 hours</option>
              <option value="12">12 hours</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Pickup Address *</label>
            <input id="address" placeholder="Full pickup address" required>
          </div>
          <div class="form-group">
            <label>Contact Phone *</label>
            <input id="phone" placeholder="Phone number" required>
          </div>
          <div class="form-group full">
            <label>Extra Details (optional)</label>
            <textarea id="details" placeholder="Any notes: spicy, contains nuts, etc."></textarea>
          </div>
        </div>
        <button type="submit" class="btn-post" id="postBtn">📤 Post Donation</button>
      </form>
    </div>
  </div>
 
  <!-- TAB: My Donations -->
  <div id="tab-mydonations" class="tab-panel">
    <div class="section-header">
      <h2>My Donations</h2>
      <span class="count-badge" id="donationCount">—</span>
    </div>
    <div id="donationsList"><div class="loading">Loading your donations…</div></div>
  </div>
 
</div>
 
<div id="toast"></div>
 
<script>
  const token = localStorage.getItem('token');
  if (!token) { window.location.href = 'login-donor.html'; }
  const headers = { 'Authorization': `Bearer ${token}` };
 
  // ── TAB SWITCHING ──────────────────────────────────────────────────────────
  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'mydonations') loadDonations();
  }
 
  // ── TOAST ──────────────────────────────────────────────────────────────────
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = type ? `show ${type}` : 'show';
    setTimeout(() => { t.className = ''; }, 3200);
  }
 
  // ── STATS ──────────────────────────────────────────────────────────────────
  async function loadStats() {
    try {
      const res = await fetch('/api/stats');
      const s = await res.json();
      document.getElementById('statsDisplay').textContent =
        `🍱 ${s.totalDonations} donations · 🤝 ${s.totalHelped} helped`;
    } catch {}
  }
 
  // ── POST DONATION ──────────────────────────────────────────────────────────
  document.getElementById('postForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('postBtn');
    btn.disabled = true; btn.textContent = 'Posting…';
 
    const formData = new FormData();
    const imageFile = document.getElementById('image').files[0];
    if (imageFile) formData.append('image', imageFile);
    formData.append('foodType',       document.getElementById('foodType').value);
    formData.append('quantity',       document.getElementById('quantity').value);
    formData.append('bestBeforeHours',document.getElementById('bestBeforeHours').value);
    formData.append('address',        document.getElementById('address').value);
    formData.append('phone',          document.getElementById('phone').value);
    formData.append('details',        document.getElementById('details').value);
 
    try {
      const res = await fetch('/api/donations', { method: 'POST', headers, body: formData });
      const data = await res.json();
      if (res.ok) {
        showToast('✅ Donation posted successfully!', 'success');
        document.getElementById('postForm').reset();
        loadStats();
        // Switch to My Donations tab
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('tab-mydonations').classList.add('active');
        loadDonations();
      } else {
        showToast('❌ ' + (data.error || 'Error posting donation'), 'error');
      }
    } catch (err) {
      showToast('❌ Network error. Please try again.', 'error');
    } finally {
      btn.disabled = false; btn.textContent = '📤 Post Donation';
    }
  });
 
  // ── MY DONATIONS ───────────────────────────────────────────────────────────
  async function loadDonations() {
    const list = document.getElementById('donationsList');
    try {
      const res = await fetch('/api/donations', { headers });
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('token');
        window.location.href = 'login-donor.html';
        return;
      }
      const donations = await res.json();
      document.getElementById('donationCount').textContent = Array.isArray(donations) ? donations.length : 0;
 
      if (!Array.isArray(donations) || donations.length === 0) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><p>No donations yet.<br>Post your first one above!</p></div>`;
        return;
      }
 
      list.innerHTML = donations.map(d => {
        const isRequested = d.status === 'requested';
        const isAccepted  = d.status === 'accepted';
        return `
          <div class="donation-card ${isRequested ? 'requested-card' : ''} ${isAccepted ? 'accepted-card' : ''}" id="dcard-${d.id}">
            <div class="food-thumb">
              ${d.image ? `<img src="${d.image}" alt="food">` : '<span>🥘</span>'}
            </div>
            <div class="card-body">
              <div class="card-title">
                ${d.foodType || 'Food'} · ${d.quantity || '?'}
                <span class="status-badge status-${d.status}">${d.status}</span>
              </div>
              <div class="card-meta">
                <span class="chip">⏱ ${d.bestBeforeHours || '?'} hrs</span>
                <span class="chip">📍 ${d.address}</span>
                <span class="chip">📞 ${d.phone || 'N/A'}</span>
              </div>
              ${d.details ? `<div class="card-details">📝 ${d.details}</div>` : ''}
 
              ${isRequested && d.requesterEmail ? `
                <div class="requester-alert">
                  📬 <strong>${d.requesterEmail}</strong> has requested this donation!
                </div>
              ` : ''}
 
              <div class="card-actions">
                ${isRequested ? `
                  <button class="btn-accept" id="abtn-${d.id}" onclick="acceptDonation(${d.id})">✅ Accept Request</button>
                  <button class="btn-reject" id="rbtn-${d.id}" onclick="rejectDonation(${d.id})">✗ Reject</button>
                ` : ''}
                ${isAccepted ? `
                  <span style="font-size:13px;color:#b45309;font-weight:700;">🎉 Accepted — Recipient picking up</span>
                ` : ''}
                ${d.status === 'posted' ? `
                  <span style="font-size:12px;color:var(--muted);">Awaiting requests…</span>
                ` : ''}
              </div>
              <div style="font-size:11px;color:var(--muted);margin-top:6px;">
                Posted ${d.createdAt ? new Date(d.createdAt).toLocaleString() : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    } catch (e) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Error loading donations. Please refresh.</p></div>`;
    }
  }
 
  // ── ACCEPT REQUEST ─────────────────────────────────────────────────────────
  async function acceptDonation(id) {
    const abtn = document.getElementById('abtn-' + id);
    const rbtn = document.getElementById('rbtn-' + id);
    if (abtn) { abtn.disabled = true; abtn.textContent = 'Accepting…'; }
    if (rbtn) rbtn.disabled = true;
 
    try {
      const res = await fetch(`/api/donations/${id}/accept`, { method: 'POST', headers });
      const data = await res.json();
      if (res.ok) {
        showToast('✅ ' + (data.message || 'Accepted!'), 'success');
        loadDonations();
        loadStats();
      } else {
        showToast('❌ ' + (data.error || 'Could not accept'), 'error');
        if (abtn) { abtn.disabled = false; abtn.textContent = '✅ Accept Request'; }
        if (rbtn) rbtn.disabled = false;
      }
    } catch (e) {
      showToast('❌ Network error', 'error');
      if (abtn) { abtn.disabled = false; abtn.textContent = '✅ Accept Request'; }
      if (rbtn) rbtn.disabled = false;
    }
  }
 
  // ── REJECT REQUEST ─────────────────────────────────────────────────────────
  async function rejectDonation(id) {
    if (!confirm('Reject this request? The donation will go back to available.')) return;
    const rbtn = document.getElementById('rbtn-' + id);
    const abtn = document.getElementById('abtn-' + id);
    if (rbtn) { rbtn.disabled = true; rbtn.textContent = 'Rejecting…'; }
    if (abtn) abtn.disabled = true;
 
    try {
      const res = await fetch(`/api/donations/${id}/reject`, { method: 'POST', headers });
      const data = await res.json();
      if (res.ok) {
        showToast('Request rejected. Donation is available again.', 'success');
        loadDonations();
      } else {
        showToast('❌ ' + (data.error || 'Could not reject'), 'error');
        if (rbtn) { rbtn.disabled = false; rbtn.textContent = '✗ Reject'; }
        if (abtn) abtn.disabled = false;
      }
    } catch (e) {
      showToast('❌ Network error', 'error');
      if (rbtn) { rbtn.disabled = false; rbtn.textContent = '✗ Reject'; }
      if (abtn) abtn.disabled = false;
    }
  }
 
  function logout() {
    localStorage.removeItem('token');
    window.location.href = 'index.html';
  }
 
  // ── INIT ───────────────────────────────────────────────────────────────────
  loadStats();
  loadDonations();
</script>
</body>
</html
