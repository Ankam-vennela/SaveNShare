<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SaveNShare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6366f1, #22c55e);
        }
        .wrapper { width: 100%; max-width: 420px; padding: 20px; }
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 28px 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .emoji { font-size: 26px; }
        h1 { font-size: 22px; color: #1f2933; }
        p.subtitle { text-align: center; font-size: 14px; color: #6b7280; margin-bottom: 18px; }
        label { display: block; margin-top: 10px; margin-bottom: 4px; font-size: 14px; color: #374151; }
        input {
            width: 100%; padding: 10px 12px; border-radius: 8px;
            border: 1px solid #d1d5db; font-size: 14px;
        }
        input:focus {
            outline: none; border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
        }
        button {
            width: 100%; margin-top: 16px; padding: 10px 14px;
            border-radius: 999px; border: none;
            background: linear-gradient(135deg, #6366f1, #22c55e);
            color: #ffffff; font-weight: 600; font-size: 15px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.5);
        }
        .bottom-text {
            margin-top: 14px; text-align: center;
            font-size: 13px; color: #4b5563;
        }
        .bottom-text a { color: #6366f1; text-decoration: none; font-weight: 600; }
        .bottom-text a:hover { text-decoration: underline; }
        #message { margin-top: 10px; font-size: 13px; text-align: center; }
        .success { color: #16a34a; }
        .error { color: #b91c1c; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="title-row">
                <span class="emoji">🔐</span>
                <h1>Forgot Password</h1>
            </div>
            <p class="subtitle">Enter your registered email. If it exists, we’ll send a reset link. For local testing, the link will also appear below.</p>

            <form id="forgotForm">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
                <button type="submit">Send Reset Link</button>
            </form>

            <p class="bottom-text">
                <a href="login-recipient.html">Back to Login</a> ·
                <a href="index.html">Home</a>
            </p>

            <div id="message"></div>
            <div id="resetLinkBox" style="margin-top:10px;font-size:12px;color:#374151;word-break:break-all;"></div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msg = document.getElementById('message');
            const linkBox = document.getElementById('resetLinkBox');
            msg.textContent = '';
            linkBox.textContent = '';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                msg.innerHTML = `<span class="success">${data.message || 'If this email exists, a reset link was sent.'}</span>`;
                if (data.resetLink) {
                    linkBox.innerHTML = `Reset link (local testing): <a href="${data.resetLink}">${data.resetLink}</a>`;
                }
            } catch (err) {
                msg.innerHTML = '<span class="error">Server error. Try again.</span>';
            }
        });
    </script>
</body>
</html>
