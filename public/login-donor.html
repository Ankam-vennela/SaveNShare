<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Login - SaveNShare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }
        .wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 28px 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .emoji {
            font-size: 26px;
        }
        h1 {
            font-size: 22px;
            color: #1f2933;
        }
        p.subtitle {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-top: 10px;
            margin-bottom: 4px;
            font-size: 14px;
            color: #374151;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.25);
        }
        button {
            width: 100%;
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #ffffff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(22, 163, 74, 0.55);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(22, 163, 74, 0.7);
        }
        .bottom-text {
            margin-top: 14px;
            text-align: center;
            font-size: 13px;
            color: #4b5563;
        }
        .bottom-text a {
            color: #16a34a;
            font-weight: 600;
            text-decoration: none;
        }
        .bottom-text a:hover {
            text-decoration: underline;
        }
        #message {
            margin-top: 10px;
            font-size: 13px;
            text-align: center;
        }
        .error { color: #b91c1c; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="title-row">
                <span class="emoji">🥗</span>
                <h1>Donor Login</h1>
            </div>
            <p class="subtitle">Login to post surplus food and help people around you.</p>

            <form id="loginForm">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>

                <button type="submit">Login</button>
            </form>

            <p class="bottom-text">
                New donor?
                <a href="register-donor.html">Register here</a> ·
                <a href="forgot-password.html">Forgot password?</a> ·
                <a href="index.html">Home</a>
            </p>

            <div id="message"></div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            msg.textContent = '';

            try {
                const res = await fetch('/api/donor/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'donor.html';
                } else {
                    msg.innerHTML = `<span class="error">${data.error || 'Login failed'}</span>`;
                }
            } catch (err) {
                msg.innerHTML = '<span class="error">Server error. Please try again.</span>';
            }
        });
    </script>
</body>
</html>
