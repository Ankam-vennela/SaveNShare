<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipient Register - SaveNShare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fb923c, #f97316);
        }
        .wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 28px 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .emoji {
            font-size: 26px;
        }
        h1 {
            font-size: 22px;
            color: #1f2933;
        }
        p.subtitle {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-top: 10px;
            margin-bottom: 4px;
            font-size: 14px;
            color: #374151;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #fb923c;
            box-shadow: 0 0 0 2px rgba(251, 146, 60, 0.25);
        }
        button {
            width: 100%;
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #fb923c, #f97316);
            color: #ffffff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.55);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(249, 115, 22, 0.7);
        }
        .bottom-text {
            margin-top: 14px;
            text-align: center;
            font-size: 13px;
            color: #4b5563;
        }
        .bottom-text a {
            color: #f97316;
            font-weight: 600;
            text-decoration: none;
        }
        .bottom-text a:hover {
            text-decoration: underline;
        }
        #message {
            margin-top: 10px;
            font-size: 13px;
            text-align: center;
        }
        .success { color: #16a34a; }
        .error { color: #b91c1c; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="title-row">
                <span class="emoji">🍲</span>
                <h1>New Recipient Register</h1>
            </div>
            <p class="subtitle">Create your account to request food donations on SaveNShare.</p>

            <form id="registerForm">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>

                <label for="password">Password (min 6 characters)</label>
                <input type="password" id="password" minlength="6"
                       placeholder="Choose a secure password" required>

                <button type="submit">Create Account</button>
            </form>

            <p class="bottom-text">
                Already have an account?
                <a href="login-recipient.html">Login</a> ·
                <a href="index.html">Home</a>
            </p>

            <div id="message"></div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            messageDiv.textContent = '';

            try {
                const res = await fetch('/api/recipient/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    messageDiv.innerHTML = `<span class="success">${data.message || 'Registered successfully!'}</span>`;
                    setTimeout(() => {
                        localStorage.setItem('token', data.token);
                        window.location.href = 'recipient.html';
                    }, 1200);
                } else {
                    messageDiv.innerHTML = `<span class="error">${data.error || 'Registration failed'}</span>`;
                }
            } catch (err) {
                messageDiv.innerHTML = '<span class="error">Network error. Please try again.</span>';
            }
        });
    </script>
</body>
</html>
