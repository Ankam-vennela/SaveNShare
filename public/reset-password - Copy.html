<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SaveNShare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #22c55e, #0ea5e9);
        }
        .wrapper { width: 100%; max-width: 420px; padding: 20px; }
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 28px 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .emoji { font-size: 26px; }
        h1 { font-size: 22px; color: #1f2933; }
        p.subtitle { text-align: center; font-size: 14px; color: #6b7280; margin-bottom: 18px; }
        label { display: block; margin-top: 10px; margin-bottom: 4px; font-size: 14px; color: #374151; }
        input {
            width: 100%; padding: 10px 12px; border-radius: 8px;
            border: 1px solid #d1d5db; font-size: 14px;
        }
        input:focus {
            outline: none; border-color: #22c55e;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.25);
        }
        button {
            width: 100%; margin-top: 16px; padding: 10px 14px;
            border-radius: 999px; border: none;
            background: linear-gradient(135deg, #22c55e, #0ea5e9);
            color: #ffffff; font-weight: 600; font-size: 15px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.5);
        }
        .bottom-text {
            margin-top: 14px; text-align: center;
            font-size: 13px; color: #4b5563;
        }
        .bottom-text a { color: #0ea5e9; text-decoration: none; font-weight: 600; }
        .bottom-text a:hover { text-decoration: underline; }
        #message { margin-top: 10px; font-size: 13px; text-align: center; }
        .success { color: #16a34a; }
        .error { color: #b91c1c; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="title-row">
                <span class="emoji">🔑</span>
                <h1>Reset Password</h1>
            </div>
            <p class="subtitle">Enter your new password. This link works only once.</p>

            <form id="resetForm">
                <label for="password">New Password (min 6 characters)</label>
                <input type="password" id="password" minlength="6" required>

                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" minlength="6" required>

                <button type="submit">Update Password</button>
            </form>

            <p class="bottom-text">
                <a href="login-recipient.html">Back to Login</a>
            </p>

            <div id="message"></div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const msg = document.getElementById('message');

        if (!token) {
            msg.innerHTML = '<span class="error">Invalid reset link.</span>';
            document.getElementById('resetForm').style.display = 'none';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (password !== confirm) {
                msg.innerHTML = '<span class="error">Passwords do not match.</span>';
                return;
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                if (res.ok) {
                    msg.innerHTML = `<span class="success">${data.message || 'Password reset successfully.'}</span>`;
                    setTimeout(() => {
                        window.location.href = 'login-recipient.html';
                    }, 1500);
                } else {
                    msg.innerHTML = `<span class="error">${data.error || 'Reset failed'}</span>`;
                }
            } catch (err) {
                msg.innerHTML = '<span class="error">Server error. Try again.</span>';
            }
        });
    </script>
</body>
</html>
